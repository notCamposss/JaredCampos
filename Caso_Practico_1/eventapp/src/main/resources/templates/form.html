<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Evento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4"
        th:text="${evento.id == null} ? 'Nuevo Evento' : 'Editar Evento'">
        Nuevo Evento
    </h2>

    <form th:object="${evento}"
          th:action="${evento.id == null} ? @{/eventos} : @{/eventos/{id}(id=${evento.id})}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}">
            <div class="text-danger" th:errors="*{nombre}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="3"
                      th:field="*{descripcion}"></textarea>
            <div class="text-danger" th:errors="*{descripcion}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" class="form-control" th:field="*{fecha}">
            <div class="text-danger" th:errors="*{fecha}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Lugar</label>
            <input type="text" class="form-control" th:field="*{lugar}">
            <div class="text-danger" th:errors="*{lugar}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <input type="text" class="form-control" th:field="*{categoria}">
            <div class="text-danger" th:errors="*{categoria}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Organizador</label>
            <input type="text" class="form-control" th:field="*{organizador}">
            <div class="text-danger" th:errors="*{organizador}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Cupo Máximo</label>
            <input type="number" class="form-control" th:field="*{cupoMaximo}">
            <div class="text-danger" th:errors="*{cupoMaximo}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Cupos Vendidos</label>
            <input type="number" class="form-control" th:field="*{cuposVendidos}">
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}">
            <div class="text-danger" th:errors="*{precio}"></div>
        </div>

        <div class="d-flex gap-2">

            <button class="btn btn-primary" type="submit">
                Guardar
            </button>

            <a th:href="@{/eventos}" class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
