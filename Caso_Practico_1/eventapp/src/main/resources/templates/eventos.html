<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Catalogo de eventos</h1>
            <p class="text-muted mb-0">
                Total: <span class="badge bg-primary" th:text="${eventos.size()}">0</span>
            </p>
        </div>
        <!--
          TODO Caso Practico:
          Aca tenes que agregar el boton "Nuevo evento" que lleve al form de creacion.
        -->
    </div>

    <!--
      TODO Caso Practico:
      Aca conviene mostrar los flash messages (ok / error) que vienen del controller.
    -->

    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" th:each="e : ${eventos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge bg-secondary" th:text="${e.categoria}">categoria</span>
                        <small class="text-muted" th:text="${e.fecha}">2026-08-01</small>
                    </div>
                    <h5 class="card-title" th:text="${e.nombre}">Nombre del evento</h5>
                    <p class="text-muted small flex-grow-1" th:text="${e.descripcion}">
                        Descripcion breve del evento.
                    </p>
                    <div class="small text-muted mb-2">
                        <i class="bi bi-geo-alt me-1"></i><span th:text="${e.lugar}">Lugar</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small>
                            <span class="fw-bold" th:text="${e.cuposVendidos} + ' / ' + ${e.cupoMaximo}">0/0</span>
                            cupos
                        </small>
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/eventos/{id}(id=${e.id})}">
                            Ver detalle
                            <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                    <!--
                      TODO Caso Practico:
                      Aca podes agregar los botones "Editar" y "Eliminar" para cada evento.
                      Recordar que "Eliminar" debe disparar un modal de confirmacion.
                    -->
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-warning mt-4" th:if="${eventos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay eventos para mostrar.
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--
  TODO Caso Practico:
  Cuando agregues el boton "Eliminar", aca al final del body
  va el modal de confirmacion + el script que toma el data-id
  de cada boton y lo inserta en la action del form de borrado.
-->

</body>
</html>
