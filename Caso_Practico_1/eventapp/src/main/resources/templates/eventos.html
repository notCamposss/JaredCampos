<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1>Catálogo de Eventos</h1>
            <p class="text-muted">
                Total:
                <span class="badge bg-primary"
                      th:text="${eventos.size()}">
                </span>
            </p>
        </div>

        <a class="btn btn-success"
           th:href="@{/eventos/nuevo}">
            <i class="bi bi-plus-circle"></i>
            Nuevo Evento
        </a>

    </div>

    <div class="row g-3">

        <div class="col-md-4"
             th:each="e : ${eventos}">

            <div class="card h-100 shadow-sm">

                <div class="card-body">

                    <span class="badge bg-secondary"
                          th:text="${e.categoria}">
                    </span>

                    <h5 class="mt-2"
                        th:text="${e.nombre}">
                    </h5>

                    <p th:text="${e.descripcion}"></p>

                    <p>
                        <strong>Fecha:</strong>
                        <span th:text="${e.fecha}"></span>
                    </p>

                    <p>
                        <strong>Lugar:</strong>
                        <span th:text="${e.lugar}"></span>
                    </p>

                    <p>
                        <strong>Cupos:</strong>
                        <span th:text="${e.cuposVendidos}"></span>
                        /
                        <span th:text="${e.cupoMaximo}"></span>
                    </p>

                    <div class="d-flex gap-2">

                        <a class="btn btn-primary btn-sm"
                           th:href="@{/eventos/{id}(id=${e.id})}">
                            Ver
                        </a>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{/eventos/{id}/editar(id=${e.id})}">
                            Editar
                        </a>

                        <button class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:attr="data-id=${e.id},data-nombre=${e.nombre}">
                            Eliminar
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<div class="modal fade"
     id="modalEliminar"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Eliminar evento
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                ¿Desea eliminar el evento
                <strong id="nombreEvento"></strong>?

            </div>

            <div class="modal-footer">

                <form id="formEliminar"
                      method="post">

                    <button type="submit"
                            class="btn btn-danger">
                        Eliminar
                    </button>

                </form>

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

            </div>

        </div>

    </div>

</div>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const modal=document.getElementById('modalEliminar');

modal.addEventListener('show.bs.modal',function(event){

const boton=event.relatedTarget;

const id=boton.getAttribute('data-id');

const nombre=boton.getAttribute('data-nombre');

document.getElementById('nombreEvento').textContent=nombre;

document.getElementById('formEliminar').action='/eventos/'+id+'/eliminar';

});

</script>

</body>
</html>
