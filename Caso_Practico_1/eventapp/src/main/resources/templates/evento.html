<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento != null} ? ${evento.nombre} + ' | EventApp' : 'Evento no encontrado'">Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4" style="max-width: 720px;">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/eventos}">Eventos</a></li>
            <li class="breadcrumb-item active">Detalle</li>
        </ol>
    </nav>

    <div th:if="${evento == null}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Evento no encontrado.
    </div>

    <div th:if="${evento != null}" class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h1 class="h3 mb-0" th:text="${evento.nombre}">Nombre</h1>
                <span class="badge bg-secondary" th:text="${evento.categoria}">categoria</span>
            </div>

            <p class="text-muted" th:text="${evento.descripcion}">Descripcion</p>

            <hr>

            <dl class="row mb-0">
                <dt class="col-sm-4">Fecha</dt>
                <dd class="col-sm-8" th:text="${evento.fecha}">2026-08-01</dd>

                <dt class="col-sm-4">Lugar</dt>
                <dd class="col-sm-8" th:text="${evento.lugar}">Lugar</dd>

                <dt class="col-sm-4">Organizador</dt>
                <dd class="col-sm-8" th:text="${evento.organizador}">Organizador</dd>

                <dt class="col-sm-4">Cupos</dt>
                <dd class="col-sm-8">
                    <span th:text="${evento.cuposVendidos}">0</span>
                    /
                    <span th:text="${evento.cupoMaximo}">0</span>
                </dd>

                <dt class="col-sm-4">Precio</dt>
                <dd class="col-sm-8">
                    <span th:if="${evento.precio == 0}">Gratis</span>
                    <span th:if="${evento.precio != 0}"
                          th:text="'CRC ' + ${#numbers.formatDecimal(evento.precio, 1, 0)}">precio</span>
                </dd>
            </dl>

            <div class="d-flex justify-content-end mt-4">
                <a th:href="@{/eventos}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
