spring.application.name=eventapp
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

# MySQL local con variables de entorno y defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eventappdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cambiame_local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - crea las tablas a partir de @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cargar perfil local (application-local.properties) si existe.
# Util para no exponer credenciales reales en application.properties.
spring.profiles.include=local
